/* ── Flowing particles along edges ───────────────────────────── */
var flowCanvas, flowCtx, flowParticles = [], edgePositions = [];
var activeEdges = null; // null = all edges active

function initFlowCanvas() {
  flowCanvas = document.createElement("canvas");
  flowCanvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;";
  flowCanvas.width  = window.innerWidth;
  flowCanvas.height = window.innerHeight;
  document.body.appendChild(flowCanvas);
  flowCtx = flowCanvas.getContext("2d");
  window.addEventListener("resize", function() {
    flowCanvas.width  = window.innerWidth;
    flowCanvas.height = window.innerHeight;
  });
}

function FlowParticle(fromPos, toPos, color) {
  this.t     = Math.random();          // position along edge 0→1
  this.speed = 0.003 + Math.random() * 0.004;
  this.from  = fromPos;
  this.to    = toPos;
  this.color = color;
  this.size  = Math.random() * 2.5 + 1;
  this.trail = [];
}
FlowParticle.prototype.update = function() {
  this.t += this.speed;
  if (this.t > 1) this.t = 0;
  var x = this.from.x + (this.to.x - this.from.x) * this.t;
  var y = this.from.y + (this.to.y - this.from.y) * this.t;
  this.trail.push({ x:x, y:y });
  if (this.trail.length > 12) this.trail.shift();
};
FlowParticle.prototype.draw = function(ctx, alpha) {
  alpha = alpha === undefined ? 1 : alpha;
  for (var i = 0; i < this.trail.length; i++) {
    var a = (i / this.trail.length) * 0.8 * alpha;
    var r = this.size * (i / this.trail.length);
    ctx.beginPath();
    ctx.arc(this.trail[i].x, this.trail[i].y, r, 0, Math.PI*2);
    ctx.fillStyle = this.color + Math.round(a*255).toString(16).padStart(2,"0");
    ctx.shadowBlur  = 8;
    ctx.shadowColor = this.color;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
};

var EDGE_COLORS_MAP = {
  "PART_OF":"#334455","PROVISIONS":"#FF9900","TRIGGERS":"#FF6B6B",
  "POWERS":"#FFD700","READS_FROM":"#00A1C9","WRITES_TO":"#00CED1",
  "USES":"#2ECC71","DEPLOYED_ON":"#9B59B6","INTEGRATES_WITH":"#E67E22",
  "EXECUTES":"#E74C3C","QUERIES":"#1ABC9C","USES_MODEL":"#FF6B6B",
  "RUNS_ON":"#F39C12","FEEDS":"#E67E22","CRAWLS":"#7B68EE",
  "POPULATES":"#7B68EE","TRANSFORMS_IN":"#1ABC9C","IMPLEMENTED_BY":"#95A5A6",
  "STORED_IN":"#7B68EE","PRODUCES":"#2ECC71","NOTIFIES":"#9B59B6",
  "PUBLISHES_TO":"#9B59B6","ALERTS_TO":"#E74C3C","ACCESSES":"#00A1C9",
  "QUERIES_VIA":"#1ABC9C","WRITTEN_IN":"#F39C12","USED_IN":"#F39C12",
  "CONFIGURES":"#F39C12","TRACKED_IN":"#95A5A6","ENFORCED_BY":"#95A5A6",
  "SUPPORTS":"#E67E22","HOSTS":"#2ECC71","ORCHESTRATES":"#FF6B6B",
  "GENERATES":"#FF6B6B","DEPLOYS_TO":"#FF9900"
};

function buildFlowParticles(network, edgeDataSet) {
  flowParticles = [];
  var edgesArr = edgeDataSet.get();
  edgesArr.forEach(function(e) {
    var fromId = e.from, toId = e.to;
    var positions = network.getPositions([fromId, toId]);
    if (!positions[fromId] || !positions[toId]) return;
    var fromDOM = network.canvasToDOM(positions[fromId]);
    var toDOM   = network.canvasToDOM(positions[toId]);
    var rel   = e.title || "PART_OF";
    var color = EDGE_COLORS_MAP[rel] || "#ffffff";
    // Skip PART_OF — too many, make them subtle
    var count = rel === "PART_OF" ? 1 : 3;
    var speedMult = rel === "PART_OF" ? 0.5 : 1;
    for (var i = 0; i < count; i++) {
      var p = new FlowParticle(fromDOM, toDOM, color);
      p.speed *= speedMult;
      p.t = i / count;
      flowParticles.push({ particle: p, edgeId: e.id, rel: rel });
    }
  });
}

function animateFlow() {
  if (!flowCtx) { requestAnimationFrame(animateFlow); return; }
  flowCtx.clearRect(0, 0, flowCanvas.width, flowCanvas.height);
  flowParticles.forEach(function(fp) {
    var active = activeEdges === null || activeEdges.indexOf(fp.edgeId) !== -1;
    fp.particle.update();
    fp.particle.draw(flowCtx, active ? (fp.rel === "PART_OF" ? 0.2 : 0.9) : 0.04);
  });
  requestAnimationFrame(animateFlow);
}

/* ── Graph interaction ────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", function() {
  initFlowCanvas();
  var bar    = document.getElementById("info-bar");
  var inName = document.getElementById("info-name");
  var inDesc = document.getElementById("info-desc");
  var inConn = document.getElementById("info-conn");


  var timer = setInterval(function() {
    if (typeof network === "undefined") return;
    clearInterval(timer);

    // ── Animated edges on vis canvas via controlled RAF ──────────
    var dashOffset  = 0;
    var edgeColorMap = {"PART_OF": "#334455", "PROVISIONS": "#FF9900", "TRIGGERS": "#FF6B6B", "POWERS": "#FFD700", "READS_FROM": "#00A1C9", "WRITES_TO": "#00CED1", "USES": "#2ECC71", "DEPLOYED_ON": "#9B59B6", "INTEGRATES_WITH": "#E67E22", "EXECUTES": "#E74C3C", "QUERIES": "#1ABC9C", "USES_MODEL": "#FF6B6B", "RUNS_ON": "#F39C12", "FEEDS": "#E67E22", "CRAWLS": "#7B68EE", "POPULATES": "#7B68EE", "TRANSFORMS_IN": "#1ABC9C", "IMPLEMENTED_BY": "#95A5A6", "STORED_IN": "#7B68EE", "PRODUCES": "#2ECC71", "NOTIFIES": "#9B59B6", "PUBLISHES_TO": "#9B59B6", "ALERTS_TO": "#E74C3C", "ACCESSES": "#00A1C9", "QUERIES_VIA": "#1ABC9C", "WRITTEN_IN": "#F39C12", "USED_IN": "#F39C12", "CONFIGURES": "#F39C12", "TRACKED_IN": "#95A5A6", "ENFORCED_BY": "#95A5A6", "SUPPORTS": "#E67E22", "HOSTS": "#2ECC71", "ORCHESTRATES": "#FF6B6B", "GENERATES": "#FF6B6B", "DEPLOYS_TO": "#FF9900"};
    var lastRedraw  = 0;

    network.on("afterDrawing", function(ctx) {
      var allEdgesData = edges.get();
      var nodeIds  = nodes.get().map(function(n){ return n.id; });
      var positions = network.getPositions(nodeIds);

      allEdgesData.forEach(function(e) {
        var fromPos = positions[e.from];
        var toPos   = positions[e.to];
        if (!fromPos || !toPos) return;

        var rel      = e.title || "PART_OF";
        var color    = edgeColorMap[rel] || "#aaaaaa";
        var isPartOf = rel === "PART_OF";
        var isActive = activeEdges === null || activeEdges.indexOf(e.id) !== -1;
        var alpha    = isActive ? (isPartOf ? 0.2 : 0.8) : 0.04;
        var lw       = isActive && !isPartOf ? 2 : 1;
        var dash     = isPartOf ? [3, 14] : [6, 6];
        var offset   = dashOffset * (isPartOf ? 0.3 : 1);

        ctx.save();
        ctx.beginPath();
        ctx.setLineDash(dash);
        ctx.lineDashOffset = offset;
        ctx.lineWidth   = lw;
        ctx.strokeStyle = color + Math.round(alpha * 255).toString(16).padStart(2,"0");
        ctx.shadowBlur  = isActive && !isPartOf ? 5 : 0;
        ctx.shadowColor = color;
        ctx.moveTo(fromPos.x, fromPos.y);
        ctx.lineTo(toPos.x,   toPos.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        ctx.restore();
      });
    });

    // Controlled redraw loop — 30fps only
    function animateEdges(ts) {
      if (ts - lastRedraw > 33) {
        dashOffset -= 1.2;
        lastRedraw  = ts;
        network.redraw();
      }
      requestAnimationFrame(animateEdges);
    }
    requestAnimationFrame(animateEdges);

    network.on("click", function(params) {
      var allNodes = nodes.get();
      var allEdges = edges.get();

      if (params.nodes.length > 0) {
        var sel  = params.nodes[0];
        var connEdges = network.getConnectedEdges(sel);
        var connNodes = network.getConnectedNodes(sel);
        connNodes.push(sel);

        // Highlight only connected flow particles
        activeEdges = connEdges;

        var nd = nodes.get(sel);
        var selColor = nd && nd.color && nd.color.border ? nd.color.border : "#ffffff";

        // Highlight nodes
        nodes.update(allNodes.map(function(n) {
          var active = connNodes.indexOf(n.id) !== -1;
          return { id: n.id, opacity: active ? 1.0 : 0.06,
                   font: { color: active ? "#ffffff" : "#111111" } };
        }));
        edges.update(allEdges.map(function(e) {
          var active = connEdges.indexOf(e.id) !== -1;
          return { id: e.id,
            color: active ? { color:"#ffcc00", opacity:1.0 } : { color:"#ffffff", opacity:0.02 },
            width: active ? 4 : 1 };
        }));

        // Info bar
        var desc = DESCRIPTIONS[sel] || "";
        var conCount = connNodes.length - 1;
        inName.textContent = nd ? nd.label : sel;
        inName.style.color = selColor;
        inDesc.textContent = desc;
        inConn.textContent = conCount + " connection" + (conCount !== 1 ? "s" : "");
        bar.style.borderTopColor = selColor + "55";
        bar.classList.remove("hidden");

      } else {
        activeEdges = null; // show all flows
        activeEdges = null;
        nodes.update(nodes.get().map(function(n) {
          return { id:n.id, opacity:1.0, font:{color:"#dddddd"} };
        }));
        edges.update(edges.get().map(function(e) {
          return { id:e.id, color:{color:"#ffffff33", opacity:1.0}, width:1 };
        }));
        bar.classList.add("hidden");
      }
    });
  }, 150);
});
</script>
